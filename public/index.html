<script>
  // Additional code for adding placeholder in search box of select2
  (function($) {
    var Defaults = $.fn.select2.amd.require('select2/defaults');

    $.extend(Defaults.defaults, {
      searchInputPlaceholder: ''
    });

    var SearchDropdown = $.fn.select2.amd.require('select2/dropdown/search');

    var _renderSearchDropdown = SearchDropdown.prototype.render;

    SearchDropdown.prototype.render = function(decorated) {

      // invoke parent method
      var $rendered = _renderSearchDropdown.apply(this, Array.prototype.slice.apply(arguments));

      this.$search.attr('placeholder', this.options.get('searchInputPlaceholder'));

      return $rendered;
    };

  })(window.jQuery);
</script>

<script>
  $(".acidjs-css3-treeview").delegate("label input:checkbox", "change", function() {
      var
          checkbox = $(this),
          nestedList = checkbox.parent().next().next(),
          selectNestedListCheckbox = nestedList.find("label:not([for]) input:checkbox");
   
      if(checkbox.is(":checked")) {
          return selectNestedListCheckbox.prop("checked", true);
      }
      selectNestedListCheckbox.prop("checked", false);
  });
  </script>

<script>
    $(document).ready(function () {
        $("#section2").hide();

        $("#show-password-screen").click(function () {
            $("#section2").fadeIn(1000);
            $("#section1").hide();
            $(".form-control").val("");
        });

        $("#show-login-screen").click(function () {
            $("#section1").fadeIn(1000);
            $("#section2").hide();
            $(".form-control").val("");
        });

        $("#quantity").keypress(function (e) {

        var maxlengthNumber = parseInt($('#quantity').attr('maxlength'));
        var inputValueLength = $('#quantity').val().length + 1;
        if (e.which != 8 && e.which != 0 && (e.which < 48 || e.which > 57)) {

          return false;
        }
        if (maxlengthNumber < inputValueLength) {
          return false;
        }
      });


        

        var detailTableWidth=$(window).width()-320;
            $('.detailTableScroll').css({'max-width':detailTableWidth,'overflow-x':'auto'});

            $('input[type="radio"]').click(function() {
               if($(this).attr('value') == 'Company') {
                    $('.show_company_selected').removeClass("d-none");           
               }
               else {
                    $('.show_company_selected').addClass("d-none");   
               }
            });

        $(".show_change_and_close_btn_in_enquiry_table").hide();
		    $( "table.enquiry_table>tbody>tr" )
			  .on( "mouseenter", function() {
			    $(this).find("div.show_change_and_close_btn_in_enquiry_table").show();
			  })
			  .on( "mouseleave", function() {
			    $(this).find("div.show_change_and_close_btn_in_enquiry_table").hide();
        });
        
        $('input[type="radio"]').click(function() {
               if($(this).attr('value') == 'Individual') {
                    $('.show_company_selected').addClass("d-none");
               }
               else {
                    $('.show_company_selected').removeClass("d-none");   
               }
            });
    });
</script>
